<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    {% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: Arial, sans-serif;
            position: relative;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{% static 'user_assets/img/Logo...webp' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.8;
            z-index: 1;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .loading-container {
            text-align: center;
            position: relative;
            z-index: 3;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .spinner {
            width: min(80px, 15vw);
            height: min(80px, 15vw);
            border: min(8px, 1.5vw) solid rgba(255, 255, 255, 0.3);
            border-top: min(8px, 1.5vw) solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto min(20px, 4vw);
        }

        .loading-text {
            color: #ffffff;
            font-size: clamp(18px, 4vw, 24px);
            margin-bottom: min(10px, 2vw);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            width: 100%;
            max-width: min(200px, 60vw);
            height: min(10px, 2vw);
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin: min(10px, 2vw) auto;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 5px;
            animation: progress 5s linear forwards;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Media Queries */
        @media screen and (max-width: 768px) {
            .loading-container {
                width: 85%;
            }
        }

        @media screen and (max-width: 480px) {
            .loading-container {
                width: 90%;
            }
            
            .spinner {
                width: 60px;
                height: 60px;
                border-width: 6px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .spinner {
                width: 40px;
                height: 40px;
                border-width: 4px;
                margin-bottom: 10px;
            }

            .loading-text {
                font-size: 16px;
                margin-bottom: 5px;
            }

            .progress-bar {
                height: 6px;
                margin: 5px auto;
            }
        }
    </style>
</head>
<body>
    <div class="background-image"></div>
    <div class="background-overlay"></div>
    <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading...</div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <script>
        // Prevent scrolling on mobile devices
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Redirect to choose-login page after 5 seconds
        setTimeout(function() {
            window.location.href = "{% url 'choose_login' %}";
        }, 5000);
    </script>
</body>
</html>
