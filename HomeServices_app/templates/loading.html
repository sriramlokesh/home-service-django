<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    {% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: -webkit-fill-available;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }

        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .loading-container {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            width: 100%;
            max-width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px auto;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 4px;
            animation: progress 5s linear forwards;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Media Queries */
        @media screen and (max-width: 768px) {
            .spinner {
                width: 50px;
                height: 50px;
                border-width: 5px;
            }

            .loading-text {
                font-size: 20px;
            }
        }

        @media screen and (max-width: 480px) {
            .spinner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }

            .loading-text {
                font-size: 18px;
            }

            .progress-bar {
                height: 6px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .spinner {
                width: 36px;
                height: 36px;
                border-width: 3px;
                margin-bottom: 10px;
            }

            .loading-text {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .progress-bar {
                height: 4px;
                margin: 5px auto;
            }
        }

        @supports (-webkit-touch-callout: none) {
            body {
                height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>
    <div class="background-wrapper">
        <img src="{% static 'user_assets/img/Logo...webp' %}" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>
    <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading...</div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <script>
        // Prevent scrolling and zooming on mobile devices
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Fix for mobile browsers' viewport height
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        window.addEventListener('resize', setVH);
        setVH();

        // Redirect to choose-login page after 5 seconds
        setTimeout(function() {
            window.location.href = "{% url 'choose_login' %}";
        }, 5000);
    </script>
</body>
</html>
