<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    {% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e6eaef;
            font-family: Arial, sans-serif;
        }

        .background-wrapper {
            position: relative;
            width: 90%;
            max-width: 500px;
            padding-bottom: 90%;
            margin: 20px;
        }

        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2c3338;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .background-image {
            width: 80%;
            height: auto;
            object-fit: contain;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            z-index: 2;
        }

        .loading-container {
            position: absolute;
            z-index: 3;
            text-align: center;
            width: 90%;
            max-width: 300px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            width: 100%;
            max-width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px auto;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 4px;
            animation: progress 5s linear forwards;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Media Queries */
        @media screen and (max-width: 768px) {
            .background-wrapper {
                width: 85%;
                padding-bottom: 85%;
            }
            
            .spinner {
                width: 50px;
                height: 50px;
                border-width: 5px;
            }

            .loading-text {
                font-size: 20px;
            }
        }

        @media screen and (max-width: 480px) {
            .background-wrapper {
                width: 95%;
                padding-bottom: 95%;
                margin: 10px;
            }
            
            .spinner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }

            .loading-text {
                font-size: 18px;
            }

            .progress-bar {
                height: 6px;
            }
        }

        @media (orientation: landscape) {
            .background-wrapper {
                width: 60vh;
                padding-bottom: 60vh;
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="background-wrapper">
        <div class="content-container">
            <img src="{% static 'user_assets/img/Logo...webp' %}" alt="Background" class="background-image">
            <div class="background-overlay"></div>
            <div class="loading-container">
                <div class="spinner"></div>
                <div class="loading-text">Loading...</div>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Prevent scrolling and zooming on mobile devices
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Redirect to choose-login page after 5 seconds
        setTimeout(function() {
            window.location.href = "{% url 'choose_login' %}";
        }, 5000);
    </script>
</body>
</html>
